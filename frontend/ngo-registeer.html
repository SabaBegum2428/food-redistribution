<!DOCTYPE html>
<html>
<head>
  <title>NGO Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
  <h2>Register Your NGO</h2>

  <form id="ngoRegisterForm">
    <input type="text" placeholder="NGO Name" id="name" required>
    <input type="email" placeholder="Email" id="email" required>
    <input type="password" placeholder="Password" id="password" required>
    <input type="text" placeholder="Registration Number" id="regNumber" required>
    <input type="text" placeholder="Contact Number" id="contact" required>
    <input type="text" placeholder="Address" id="address" required>
    <button type="submit">Register</button>
  </form>

  <p style="margin-top:15px;">
    Already registered? <a href="ngo-login.html">Login</a>
  </p>
</div>

<script src="js/ngo-auth.js"></script>
</body>
</html>
